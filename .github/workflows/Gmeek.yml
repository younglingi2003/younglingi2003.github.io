name: build Gmeek

on:
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: "要更新的 Issue 编号，例如 5 或 3,5,8；留空或填 0 表示更新全部文章"
        required: false
        default: ""
        type: string

# Manual publishing only. Runs are queued to prevent generated files from
# overwriting one another if the button is clicked more than once.
concurrency:
  group: gmeek-${{ github.repository }}
  queue: max
  cancel-in-progress: false

jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-24.04
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Get config.json
        run: |
          echo "====== check config.josn file ======"
          cat config.json
          echo "====== check config.josn end  ======"
          sudo apt-get install jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)
          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek;
          cd /opt/Gmeek/
          lastTag=$(git describe --tags `git rev-list --tags --max-count=1`)
          if [ $GMEEK_VERSION == 'last' ]; then git checkout $lastTag; else git checkout $GMEEK_VERSION; fi;

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        env:
          ISSUE_NUMBERS: ${{ inputs.issue_numbers }}
        run: |
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek/
          NORMALIZED="${ISSUE_NUMBERS// /}"
          if [ -z "$NORMALIZED" ] || [ "$NORMALIZED" = "0" ]; then
            echo "Full rebuild: update all articles"
            python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number ''
          else
            IFS=',' read -ra NUMBERS <<< "$ISSUE_NUMBERS"
            for number in "${NUMBERS[@]}"; do
              number="$(echo "$number" | xargs)"
              if ! [[ "$number" =~ ^[1-9][0-9]*$ ]]; then
                echo "Invalid Issue number: $number"
                exit 1
              fi
              echo "Update Issue #$number"
              python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number "$number"
            done
          fi
          cp -a /opt/Gmeek/docs ${{ github.workspace }} 
          cp -a /opt/Gmeek/backup ${{ github.workspace }} 
          cp /opt/Gmeek/blogBase.json ${{ github.workspace }} 
          
      - name: update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m '🎉 auto update by Gmeek action'
            git push origin HEAD:main
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/.'
          
  deploy:
    name: Deploy blog
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
